name: Deploy Log Analytics to Dataproc

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: project-34c13448-074a-417a-b64
  REGION: northamerica-northeast1
  CLUSTER_NAME: distributed-system
  BUCKET_NAME: vinay-log-dataproc-6731
  JAR_NAME: distributed-log-analytics-spark-assembly-0.1.0.jar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: projects/150195794927/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-ci@project-34c13448-074a-417a-b64.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 363.0.0"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Set GCP project
        run: gcloud config set project "$PROJECT_ID"

      - name: Build fat jar
        run: sbt clean assembly

      - name: Upload jar to GCS
        run: |
          JAR_PATH=$(find target -name "*assembly*.jar" | head -n 1)

          if [ -z "$JAR_PATH" ]; then
            echo "Assembly jar not found"
            exit 1
          fi

          echo "Uploading jar: $JAR_PATH"
          gcloud storage cp "$JAR_PATH" "gs://${BUCKET_NAME}/jars/${JAR_NAME}"

      - name: Upload input data to GCS
        run: |
          if [ -d "data" ]; then
            gcloud storage cp --recursive data "gs://${BUCKET_NAME}/"
            gcloud storage ls --recursive "gs://${BUCKET_NAME}/data/"
          else
            echo "data folder not found"
            exit 1
          fi

      - name: Validate Dataproc cluster and GCS bucket
        run: |
          gcloud dataproc clusters describe "$CLUSTER_NAME" --region "$REGION" --project "$PROJECT_ID" >/dev/null
          gcloud storage ls "gs://${BUCKET_NAME}" >/dev/null

      - name: Submit Spark job to Dataproc asynchronously
        run: |
          gcloud dataproc jobs submit spark \
            --async \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --cluster="$CLUSTER_NAME" \
            --class=com.loganalytics.Main \
            --jars="gs://${BUCKET_NAME}/jars/${JAR_NAME}" \
            --properties=spark.driver.memory=2g,spark.executor.memory=2g,spark.executor.cores=1,spark.sql.adaptive.enabled=false,spark.sql.maxPlanStringLength=10000 \
            -- \
            --logs "gs://${BUCKET_NAME}/data/logs.parquet" \
            --deployments "gs://${BUCKET_NAME}/data/deployments.parquet" \
            --host-meta "gs://${BUCKET_NAME}/data/host_meta.parquet" \
            --output "gs://${BUCKET_NAME}/output" \
            --input-format parquet \
            --session-timeout-minutes 30 \
            --attribution-window-hours 6 \
            --baseline-hours 24 \
            --salt-buckets 16 \
            --target-partitions 16